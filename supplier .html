<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="supplier.css" />
  </head>
  <body>
    <h1 class="h1">Supplier Registration Form</h1>
    <nav>
      <ul>
        <li><a href="#">Supplier Info</a></li>
        <li><a href="#">Contact Details</a></li>
        <li><a href="#">Payment Details</a></li>
        <li><a href="#">Location</a></li>
        <li><a href="#">Payment Details</a></li>
      </ul>
    </nav>
    <div class="container">
      <div class="sidebar">
        <form class="form-1" >
          <h1 class="title" >Supplier Information</h1>
          <div class="content-label">
            <div class="label-input">
              <label for="sname">Supplier Name</label>
              <input type="text" id="sname" placeholder="Enter Supplier Name" />
            </div>
            <div class="label-input">
              <label for="sid">Supplier ID</label>
              <input type="text" id="id" placeholder="SUP-001" />
            </div>
            <div class="label-input">
              <label for="cname">Company Name</label>
              <input type="text" id="cname" placeholder="Enter Company Name" />
            </div>
            <div class="label-input">
              <label>Supplier Type</label>
              <select>
                <option value="" disabled select>Select Type</option>
                <option value="1" disabled select>Clothing</option>
                <option value="2" disabled select>Textiles</option>
                <option value="3" disabled select>Appliances</option>
                <option value="4" disabled select>Electronics</option>
              </select>
            </div>
          </div>
          <h2 class="title" >Contact Information</h2>
          <div class="hand">
            <div class="container-mem">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" placeholder="+256 88888888" />
            </div>
            <div class="container-mem">
              <label for="email">Email</label>
              <input type="text" id="email" placeholder="mahi@gmail.com" />
            </div>
            <div class="container-mem">
              <label for="aphone">Alternative Phone</label>
              <input
                type="text"
                id="aphone"
                placeholder="Enter Alternative Phone"
              />
            </div>
            <div class="container-mem">
              <label for="website">Website</label>
              <input
                type="url"
                id="website"
                placeholder="https://www.example.com"
              />
            </div>
          </div>
          <h4 class="title" >Bank & Payment Details</h4>
          <div class="badr">
            <div class="mahi">
              <label for="pay">Payment Method</label>
              <select>
                <option value="" disabled select>Select Payment Method</option>
                <option value="1" disabled select>Credit Card</option>
                <option value="2" disabled select>Momo pay</option>
                <option value="3" disabled select>Aitel Money</option>
                <option value="4" disabled select>Cash</option>
              </select>
            </div>
            <div class="mahi">
              <label for="bname">Bank Name</label>
              <input type="text" id="bname" placeholder="Enter Bank Name" />
            </div>
            <div class="mahi">
              <label for="anumber">Accont Number</label>
              <input
                type="number"
                id="anumber"
                placeholder="Enter Account Number"
              />
            </div>
            <div class="mahi">
              <label for="hol">Account Holder Name</label>
              <input
                type="text"
                id="hol"
                placeholder="Enter Account Holder Name"
              />
            </div>
          </div>
          <button class="reset" >Reset</button>
        </form>
      </div>
      <div class="content">
        <form class="form-2" >
          <h3 class="title-33" >Location</h3>
          <div class="sunna">
            <div class="zak">
              <label for="Location">Country</label>
              <select>
                <option value="" disabled select>Select Country</option>
                <option value="1">Uganda</option>
                <option value="2">Kenya</option>
                <option value="3">Tanzania</option>
                <option value="4">Eritria</option>
              </select>
            </div>
            <div class="zak">
              <label for="city">City</label>
              <select>
                <option value="" disabled select>Select City</option>
                <option value="1">Kampala</option>
                <option value="2">Nairobi</option>
                <option value="3">Daresalam</option>
                <option value="4">Djibouti</option>
              </select>
            </div>
            <div class="zak">
              <label for="add">Bussiness Address</label>
              <input
                type="text"
                id="add"
                placeholder="Enter Full Bussiness Address"
              />
            </div>
            <div class="zak">
              <label for="code">Postal Code</label>
              <input type="number" id="code" placeholder="Enter Postal Code" />
            </div>
          </div>
          <h5  class="title-33" >Bussiness & Tax Details</h5>
          <div class="sufi">
            <div class="muhi">
              <label for="tax">Tax ID / TIN</label>
              <input type="number" id="tax" placeholder="Enter Tax ID" />
            </div>
            <div class="muhi">
              <label for="rnumb">Registration Number</label>
              <input
                type="number"
                id="rnumb"
                placeholder="Enter Registration Number"
              />
            </div>
            <div class="muhi">
              <label for="lnumb">Bussiness Licence Number</label>
              <input
                type="number"
                id="lnumb"
                placeholder="Enter lIcence Number"
              />
            </div>
            <div class="muhi">
              <label for="edate">Expiry Date</label>
              <input type="date" id="edate" placeholder="Select date" />
            </div>
          </div>
          <h6 class="title-33"  >Uploads & Comments</h6>
          <div class="asla"  >
            <div  class="ahma" >
              <label for="list">Upload list items</label>
              <input type="file" id="list" placeholder="Upload List Items" />
            </div>
            <div class="ahma" >
              <label for="video">Upload video</label>
              <input type="video" id="video" placeholder="Upload Video" />
            </div>
            <div class="ahma"  >
              <label for="date">Date</label>
              <input type="date" id="date" placeholder="select date" />
            </div>
            <div  class="ahma" >
              <label for="notes">Notes</label>
              <input type="text" id="list" placeholder="Any aditional notes" />
            </div>
          </div>
          <button class="submit" >Submit</button>
        </form>
      </div>
    </div>
  </body>
</html>
