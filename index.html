<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="eleme"  >
          <img class="square"  src="zang.jpg" alt="picture">
          <p>MAGEZI HIBER: Project manager</p>
        </div>
        <div class="boa">
        <div class="board" >
          <a href="index.html">Dashboard</a>
        </div>
        <div class="board" >
          <a href="Ssales.html">Management</a>
        </div>
        <div class="board" >
          <a href="gid.html">Supplier</a>
        </div>
        </div>
      </div>
      <div class="content">
        <!--section-->
        <section>
          <form>
            <h1 class="title"  >Sales Registration</h1>
            <div class="input-container">
              <div class="input-section">
                <label for="salesdate">Sales Date</label>
                <input type="date" id="salesdate" />
              </div>
              <div class="input-section">
                <label for="salesperson">Salesperson</label>
                <select class="select" >
                  <option value="" disabled selected>Salesrepresentative</option>
                  <option value="1">hiber</option>
                  <option value="2">mag</option>
                </select>
              </div>
            </div>
            <h2 class="title"  >Customer Details</h2>
            <div class="select-container">
              <div class="select-label">
                <label>Full Name</label>
                <input type="text" id="fname" placeholder="Enter full name" />
              </div>
              <div class="select-label">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter email" />
              </div>
              <div class="select-label">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter phone number" />
              </div>
              <div class="select-label">
                <label for="type">Type</label>
                <select class="select"  >
                  <option value="" disabled selected>Select customer type</option>
                  <option value="1">food</option>
                  <option value="2">sausage</option>
                </select>
              </div>
            </div>
            <h3  class="title">Items</h3>
            <div class="item-container" >
              <div class="item-select" >
                <label for="pdt">Pdt Id</label>
                <input type="text" id="pdt" placeholder="pdt ID" />
              </div>
              <div class="item-select" >
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" />
              </div>
              <div class="item-select" >
                <label for="unitp">Unit Price</label>
                <input type="number" id="unitp" />
              </div>
              <div class="item-select" >
                <label for="pd">Product ID</label>
                <input type="text" id="pd" placeholder="pdt ID" />
              </div>
              <div class="item-select" >
                <label for="qty">Quantity</label>
                <input type="number" id="qty" />
              </div>
              <div  class="item-select" >
                <label for="unitp">Unit Price</label>
                <input type="number" id="unitp" />
              </div>
            </div>
            <div class="butt" >
              <button  class="can" type="button"  >Cancel</button>
              <button class="submit"  type="button" >Submit</button>
            </div>
          </form>
        </section>
      </div>
    </div>
  </body>
</html>
